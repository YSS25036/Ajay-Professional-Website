# Local dev config - uses decap-server proxy to read/write real files (no login)
# Used automatically when visiting /admin on localhost
# Run: npx decap-server (in project root, alongside npm run dev)
backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

locale: "en"

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Publish Date", name: "pubDate", widget: "datetime" }
      - { label: "Featured Image", name: "thumbnail", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Order", name: "order", widget: "number", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "resources-articles"
    label: "Resources - Articles"
    folder: "src/content/resourcesArticles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Source URL", name: "sourceUrl", widget: "string" }
      - { label: "Source", name: "source", widget: "select", options: ["LinkedIn", "X", "Article", "HBR", "Medium", "Other"] }
      - { label: "Author", name: "author", widget: "string", required: false }
      - { label: "Publish Date", name: "pubDate", widget: "datetime", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }

  - name: "resources-leaders"
    label: "Resources - Leaders"
    folder: "src/content/resourcesLeaders"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Focus", name: "focus", widget: "string" }
      - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
      - { label: "Twitter/X", name: "twitter", widget: "string", required: false }
      - { label: "Website", name: "website", widget: "string", required: false }
      - { label: "Order", name: "order", widget: "number", required: false }

  - name: "resources-tools"
    label: "Resources - Tools"
    folder: "src/content/resourcesTools"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "URL", name: "url", widget: "string" }
      - { label: "Category", name: "category", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Order", name: "order", widget: "number", required: false }
