[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect hidden Resources page to home (temporary until content is ready)
[[redirects]]
  from = "/resources"
  to = "/"
  status = 302

[[redirects]]
  from = "/resources/"
  to = "/"
  status = 302

# Ensure /admin serves the Decap CMS page (rewrite so URL stays /admin)
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200
  force = true
